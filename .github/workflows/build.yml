name: Build APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'phone2pc/android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          cd phone2pc/android
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd phone2pc/android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone2pc-audio-debug-apk
          path: phone2pc/android/app/build/outputs/apk/debug/app-debug.apk
